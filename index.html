<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>바이오리듬 & 메뉴 추천기 | 생년월일 기반 번호 및 식단 추천</title>

  <meta name="description" content="생년월일 기반 바이오리듬 로또 번호와 오늘의 아침, 점심, 저녁 메뉴를 추천해주는 무료 서비스입니다." />
  <meta name="keywords" content="바이오리듬, 로또번호 추천, 메뉴 추천, 식단 추천, 무료 추천기" />
  <meta name="author" content="김정아" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="바이오리듬 & 메뉴 추천기" />
  <meta property="og:description" content="나에게 맞는 로또 번호와 맛있는 식사 메뉴를 추천받아보세요." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed, #eef2ff);
      color: #222;
      line-height: 1.6;
    }

    header, main, section, footer {
      width: 100%;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 50px 20px;
      text-align: center;
    }

    /* Navigation Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
      gap: 10px;
    }

    .tab-btn {
      padding: 12px 24px;
      background: #e2e8f0;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      color: #475569;
    }

    .tab-btn.active {
      background: #7c3aed;
      color: white;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .card {
      background: #ffffff;
      padding: 40px 24px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: none;
    }

    .card.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #6d28d9;
      font-size: 32px;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 22px;
      color: #333;
      margin-top: 40px;
    }

    p {
      color: #555;
      font-size: 16px;
    }

    label {
      display: block;
      margin-top: 24px;
      font-weight: bold;
      color: #333;
    }

    input {
      padding: 14px;
      width: 100%;
      max-width: 320px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      margin: 12px 0 18px;
    }

    button {
      padding: 14px 28px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #5b21b6;
    }

    .info {
      margin-top: 24px;
      color: #555;
      font-size: 15px;
    }

    .result {
      margin-top: 28px;
    }

    .lotto-set {
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
      margin: 16px 0;
    }

    .ball {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #facc15;
      color: #111;
      font-weight: bold;
      margin: 5px;
    }

    .bonus {
      background: #fb7185;
      color: white;
    }

    .plus {
      font-size: 24px;
      font-weight: bold;
      color: #555;
      margin: 0 8px;
    }

    /* Meal Section Styles */
    .meal-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
    }

    .meal-card {
      background: #fdf2f8;
      border: 2px solid #fbcfe8;
      border-radius: 16px;
      padding: 20px;
      width: 200px;
      text-align: center;
      transition: transform 0.2s;
    }

    .meal-card:hover {
      transform: scale(1.05);
    }

    .meal-type {
      font-size: 14px;
      color: #db2777;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meal-name {
      font-size: 18px;
      font-weight: bold;
      color: #1f2937;
    }

    .guide {
      margin-top: 40px;
      text-align: left;
      background: #fafafa;
      padding: 24px;
      border-radius: 18px;
    }

    footer {
      margin-top: 28px;
      font-size: 14px;
      color: #777;
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "바이오리듬 & 메뉴 추천기",
    "description": "생년월일 기반 바이오리듬 로또 번호와 오늘의 메뉴를 추천해주는 웹사이트입니다.",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "All",
    "inLanguage": "ko-KR",
    "author": {
      "@type": "Person",
      "name": "김정아"
    }
  }
  </script>
</head>

<body>
  <header class="container">
    <h1>오늘의 추천 서비스</h1>
    <p>당신의 하루에 작은 행운과 즐거움을 더해드립니다.</p>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab-btn active" onclick="switchTab('lotto')">로또 번호 추천</button>
      <button class="tab-btn" onclick="switchTab('meal')">메뉴 추천</button>
    </nav>

    <!-- Lotto Section -->
    <section id="lotto-section" class="card active" aria-labelledby="lotto-title">
      <h2 id="lotto-title">생년월일 기반 로또번호 추천</h2>
      <p>바이오리듬 주기를 계산하여 행운의 번호를 추천해드립니다.</p>

      <label for="birthDate">생년월일 선택</label>
      <input type="date" id="birthDate" />
      <br />
      <button type="button" onclick="generateLotto()">추천받기</button>

      <div class="info" id="biorhythmInfo"></div>
      <div class="result" id="result"></div>
    </section>

    <!-- Meal Section -->
    <section id="meal-section" class="card" aria-labelledby="meal-title">
      <h2 id="meal-title">오늘의 식사 메뉴 추천</h2>
      <p>결정 장애 해결! 아침, 점심, 저녁 메뉴를 골라드릴게요.</p>
      
      <button type="button" onclick="generateMeals()">메뉴 추천받기</button>

      <div class="meal-options" id="mealResult"></div>
    </section>

    <section class="guide">
      <h2>서비스 이용 안내</h2>
      <ul>
        <li><strong>로또 추천:</strong> 생년월일을 바탕으로 신체, 감성, 지성 주기를 분석합니다.</li>
        <li><strong>메뉴 추천:</strong> 엄선된 30가지 이상의 메뉴 중 랜덤으로 추천합니다.</li>
      </ul>
      <p>※ 모든 결과는 재미로만 즐겨주세요!</p>
    </section>
  </main>

  <footer class="container">
    © 2026 김정아.
  </footer>

  <script>
    function switchTab(tabName) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(tabName + '-section').classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function generateLotto() {
      const birthDateValue = document.getElementById("birthDate").value;
      if (!birthDateValue) { alert("생년월일을 입력해주세요."); return; }
      
      const birthDate = new Date(birthDateValue);
      const today = new Date();
      if (birthDate > today) { alert("오늘보다 미래 날짜는 입력할 수 없습니다."); return; }

      const diffTime = today - birthDate;
      const daysAlive = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const physical = Math.sin((2 * Math.PI * daysAlive) / 23);
      const emotional = Math.sin((2 * Math.PI * daysAlive) / 28);
      const intellectual = Math.sin((2 * Math.PI * daysAlive) / 33);

      document.getElementById("biorhythmInfo").innerHTML = `
        <strong>오늘의 바이오리듬</strong><br>
        신체: ${Math.round(physical * 100)} / 감성: ${Math.round(emotional * 100)} / 지성: ${Math.round(intellectual * 100)}
      `;

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const numbers = [];
        let seed = daysAlive + i * 999;
        while (numbers.length < 6) {
          seed = (seed * 9301 + 49297) % 233280;
          const n = Math.floor((seed / 233280) * 45) + 1;
          if (!numbers.includes(n)) numbers.push(n);
        }
        numbers.sort((a, b) => a - b);
        
        let bonus;
        let bSeed = daysAlive + i * 777;
        do {
          bSeed = (bSeed * 9301 + 49297) % 233280;
          bonus = Math.floor((bSeed / 233280) * 45) + 1;
        } while (numbers.includes(bonus));

        resultDiv.innerHTML += `
          <div class="lotto-set">
            <h3>${i}세트</h3>
            ${numbers.map(n => `<span class="ball">${n}</span>`).join('')}
            <span class="plus">+</span>
            <span class="ball bonus">${bonus}</span>
          </div>
        `;
      }
    }

    const meals = {
      breakfast: ["전복죽", "토스트", "시리얼", "오므라이스", "샌드위치", "미역국", "순두부찌개", "누룽지", "과일 샐러드"],
      lunch: ["김치찌개", "된장찌개", "비빔밥", "돈가스", "제육볶음", "파스타", "짜장면", "짬뽕", "햄버거", "샐러드", "냉면", "칼국수", "쌀국수"],
      dinner: ["삼겹살", "치킨", "피자", "초밥", "보쌈", "떡볶이", "갈비찜", "마라탕", "족발", "샤브샤브", "감자탕", "스테이크", "회"]
    };

    function generateMeals() {
      const res = document.getElementById("mealResult");
      res.innerHTML = "";
      const labels = { breakfast: "아침", lunch: "점심", dinner: "저녁" };
      
      ["breakfast", "lunch", "dinner"].forEach(type => {
        const list = meals[type];
        const pick = list[Math.floor(Math.random() * list.length)];
        res.innerHTML += `
          <div class="meal-card">
            <div class="meal-type">${labels[type]}</div>
            <div class="meal-name">${pick}</div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
